name: wwr
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10
  
  # PyTorch with CUDA support
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=12.1
  
  # Core ML libraries
  - segmentation-models-pytorch
  - albumentations
  - scikit-learn
  - scikit-image
  - tqdm
  
  # Geospatial libraries
  - geopandas
  - rasterio
  - fiona
  - shapely
  - pyproj
  - pyogrio
  - gdal
  
  # Data processing
  - numpy
  - pandas
  - xarray
  - netcdf4
  
  # Visualization
  - matplotlib
  - seaborn
  - folium
  - ipyleaflet
  
  # Jupyter and development
  - jupyter
  - jupyterlab
  - ipykernel
  - ipywidgets
  
  # Utilities
  - tqdm
  - requests
  - pillow
  - h5py
  - zarr
  
  # Optional but useful
  - earthpy
  - rioxarray
  - contextily
  
  # Development tools
  - black
  - flake8
  - pytest
  - pip

  # Pip packages (for packages not available in conda)
  - pip:
    - timm  # For additional encoder backbones
    - tensorboard  # For training monitoring
    - wandb  # For experiment tracking (optional)
    - earth-engine-api  # For Google Earth Engine
    - earthengine-api  # Alternative EE package 